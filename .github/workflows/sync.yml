name: Index Search Data

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
  workflow_dispatch:  # Allow manual trigger

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Profile Search Index
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "X-Api-Key: ${{ secrets.INDEX_API_KEY }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.API_BASE_URL }}/search/profiles/reindex")
          
          echo "Profile Index Response: $response"
          
          if [ "$response" -eq 204 ]; then
            echo "Profile index rebuilt successfully."
          elif [ "$response" -eq 401 ]; then
            echo "Authentication failed. Check INDEX_API_KEY secret."
            exit 1
          else
            echo "Unexpected response: $response"
            exit 1
          fi

      - name: Trigger Business Search Index
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "X-Api-Key: ${{ secrets.INDEX_API_KEY }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.API_BASE_URL }}/search/businesses/reindex")
          
          echo "Business Index Response: $response"
          
          if [ "$response" -eq 204 ]; then
            echo "Business index rebuilt successfully."
          elif [ "$response" -eq 401 ]; then
            echo "Authentication failed. Check INDEX_API_KEY secret."
            exit 1
          else
            echo "Unexpected response: $response"
            exit 1
          fi
